server.port=${SERVER_PORT}

frontend.url=${FRONTEND_URL}

spring.jpa.hibernate.ddl-auto=update

#spring.application.name=Online-Food-Ordering
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

#com.mysql.cj.jdbc.Driver , without .cj its throwing error
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

stripe.api.key=${STRIPE_API_KEY}

spring.datasource.hikari.connection-init-sql=SET SESSION sql_require_primary_key=0

# ── GZIP Response Compression ──────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ── HikariCP Connection Pool Tuning ────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ── Spring Cache (in-memory) ────────────────────────────────
spring.cache.type=simple

# ── JPA Performance ─────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true